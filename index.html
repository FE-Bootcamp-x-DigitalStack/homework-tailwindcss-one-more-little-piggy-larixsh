<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS | One little piggy</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-pig-white: #ffffff;
        --color-pig-light: #f9beca;
        --color-pig-black: #000000;
        --color-pig-dark: #f46e86;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-[#ffffff] flex justify-center items-center h-screen m-0">
    <div class="piggy-container relative w-[400px] h-[400px]">
      <div class="ear left absolute top-4 left-[70px] w-20 h-20 bg-pig-light border-8 border-pig-black rounded-full z-0"></div>
      <div class="ear right absolute top-4 right-[70px] w-20 h-20 bg-pig-light border-8 border-pig-black rounded-full z-0"></div>

      <div class="face absolute bottom-2.5 left-5 w-[360px] h-[360px] bg-pig-light border-8 border-pig-black rounded-full z-10">
        <div class="absolute top-[80px] left-1/2 -translate-x-1/2 w-[280px] flex justify-between">
          <div class="eye eye-left w-[90px] h-[90px] bg-pig-white border-[6px] border-pig-black rounded-full flex items-center justify-center relative z-30">
            <div class="w-[45px] h-[45px] bg-pig-black rounded-full relative flex items-center justify-center">
              <div class="w-[12px] h-[12px] bg-pig-white rounded-full absolute top-[6px] left-[6px]"></div>
            </div>
          </div>

          <div class="eye eye-right w-[90px] h-[90px] bg-pig-white border-[6px] border-pig-black rounded-full flex items-center justify-center relative z-30">
            <div class="w-[45px] h-[45px] bg-pig-black rounded-full relative flex items-center justify-center">
              <div class="w-[12px] h-[12px] bg-pig-white rounded-full absolute top-[6px] left-[6px]"></div>
            </div>
          </div>
        </div>

        <div class="nose absolute bottom-[60px] left-1/2 -translate-x-1/2 w-[200px] h-[110px] bg-pig-dark border-[8px] border-pig-black rounded-[50px] z-40">
          <div class="nostril nostril-left absolute top-[25px] left-[35px] w-[32px] h-[50px] bg-pig-black rounded-full"></div>
          <div class="nostril nostril-right absolute top-[25px] right-[35px] w-[32px] h-[50px] bg-pig-black rounded-full"></div>
        </div>
      </div>
    </div>
  </body>
</html>
